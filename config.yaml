# config.yaml — single source of truth for f5kb.
# Three sections: types (dump field keep-lists), field_descriptions (catalogue
# annotations; was field_descriptions.yaml), products (read-only product snapshot;
# was supplemental_products.json). See README.txt / OUTLINE.txt.
#
# NOTE: the `types:` block below is the former dump_config.yaml, verbatim.

# Configuration for dump_articles.ts
# =====================================
# One entry per document type. Each entry:
#   documentType   Exact Coveo `f5_document_type` value (what the API filters on).
#   metadata       Which fields land in the entry's "metadata" object.
#   content        Which fields land in the entry's "content" object.
#
# metadata / content each accept either:
#   "*"          include every field returned by the API
#   [ a, b, c ]  include only the named fields (matched by bare name against the
#                top-level result object and the raw field bag; top-level wins on
#                a clash; content wins over metadata on overlap).
#
# All 15 document types were catalogued (metadata: "*") and then curated down to
# the substantive fields, dropping sys* mirrors, duplicate-case variants
# (Title/Excerpt/...), per-query Coveo plumbing, and redundant encodings.
#
# CONTENT (article body) availability by backend:
#   - Salesforce Knowledge types  -> sfdetails__c (full HTML body)
#   - Community (Khoros/Lithium)  -> limessagebody (post body)
#   - Education (Zendesk)         -> zendeskdescription (HTML body)
#   - TechComm/sitemap types (Manual, Release Note, Supplemental Document,
#     F5 GitHub) and Bug Tracker  -> NO body field is returned by the search
#     index, so content: [] (only metadata + excerpt are available).
#
# DEPRECATION: @f5_lifecycle (release|archived) exists only on Manual, Release
# Note, and Supplemental Document; it is kept in their metadata. Other types
# have no per-article deprecation flag.

types:

  # --- Salesforce Knowledge types (body = sfdetails__c) --------------------

  Support_Solution:
    documentType: "Support Solution"
    metadata:
      - f5_kb_id                       # K-number, e.g. K000161535
      - f5_title                       # title without the K-prefix
      - uniqueId                       # Coveo internal document identifier
      - permanentid                    # Coveo content hash, stable across re-indexes
      - sfkavid                        # SF KnowledgeArticleVersion ID (ka0Po...)
      - sfkbid                         # SF KnowledgeArticle ID (kA0Po...), stable across versions
      - sfurlname                      # URL slug (= K-number)
      - sfarticlenumber                # number without the "K" prefix
      - f5_created_date                # article creation date
      - f5_original_published_date     # original publication date
      - f5_updated_published_date      # most recent publication/update date
      - sflastmodifieddate             # last modified (fallback)
      - excerpt                        # short extract (~150 chars)
      - concepts                       # Coveo-extracted key concepts (semicolon-sep.)
      - wordcount                      # word count of indexed content
      - f5_document_type               # e.g. ["Support Solution"]
      - sfrecord_type_name__c          # e.g. "Support Service"
      - sfvalidationstatus             # e.g. "Validated"
      - f5_status                      # publication status, e.g. "Online"
      - f5_kb_public                   # visibility, e.g. "Public"
      - f5_is_new_kb_article           # "true"/"false"
      - sfislatestversion              # "true"/"false"
      - language                       # e.g. ["English"]
      - f5_article_creator             # author display name
      - f5_employee                    # whether author is an F5 employee
      - f5_product                     # top-level product names
      - f5_product_grouping            # broad grouping
      - f5_version                     # full version hierarchy, pipe-delimited
      - sfapplies_to_products__c       # JSON array of affected products + versions
      - sfapplies_to_versions__c       # comma-separated version list
    content:
      - sfdetails__c                   # full article HTML body

